<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:40px;display:flex;flex-direction:column;gap:32px;align-items:flex-start}
.logo-dark{background:#07074E;padding:48px 56px;border-radius:12px;display:inline-flex;align-items:center;gap:28px}
.logo-light{background:#F0F0F7;padding:48px 56px;border-radius:12px;display:inline-flex;align-items:center;gap:28px}
.ei-symbol{display:flex;gap:10px}
.ei-e{display:flex;flex-direction:column;gap:6px}
.ei-e-inv{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
</style>

<div class="wrap">

  <!-- OSCURO -->
  <div class="logo-dark">
    <div class="ei-symbol">
      <!-- E izquierda — invertida (abre hacia la izquierda) -->
      <div class="ei-e-inv">
        <div style="width:38px;height:14px;background:#fff;border-radius:2px"></div>
        <div style="width:28px;height:14px;background:#fff;border-radius:2px"></div>
        <div style="width:38px;height:14px;background:#fff;border-radius:2px"></div>
      </div>
      <!-- E derecha — normal (abre hacia la derecha) -->
      <div class="ei-e">
        <div style="width:38px;height:14px;background:#fff;border-radius:2px"></div>
        <div style="width:28px;height:14px;background:#fff;border-radius:2px"></div>
        <div style="width:38px;height:14px;background:#fff;border-radius:2px"></div>
      </div>
    </div>
    <div>
      <div style="font-family:'Poppins',sans-serif;font-weight:700;font-size:26px;color:#fff;letter-spacing:-.4px;line-height:1.1">EduIntelligence</div>
      <div style="font-family:'Poppins',sans-serif;font-weight:500;font-size:14px;color:rgba(255,255,255,.45);letter-spacing:-.1px;margin-top:3px">Academy</div>
    </div>
  </div>

  <!-- CLARO -->
  <div class="logo-light">
    <div class="ei-symbol">
      <div class="ei-e-inv">
        <div style="width:38px;height:14px;background:#07074E;border-radius:2px"></div>
        <div style="width:28px;height:14px;background:#07074E;border-radius:2px"></div>
        <div style="width:38px;height:14px;background:#07074E;border-radius:2px"></div>
      </div>
      <div class="ei-e">
        <div style="width:38px;height:14px;background:#07074E;border-radius:2px"></div>
        <div style="width:28px;height:14px;background:#07074E;border-radius:2px"></div>
        <div style="width:38px;height:14px;background:#07074E;border-radius:2px"></div>
      </div>
    </div>
    <div>
      <div style="font-family:'Poppins',sans-serif;font-weight:700;font-size:26px;color:#07074E;letter-spacing:-.4px;line-height:1.1">EduIntelligence</div>
      <div style="font-family:'Poppins',sans-serif;font-weight:500;font-size:14px;color:#07074E;opacity:.4;letter-spacing:-.1px;margin-top:3px">Academy</div>
    </div>
  </div>

</div>
