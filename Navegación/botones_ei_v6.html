<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@600;700&display=swap" rel="stylesheet">

<div style="background:#EAEAF2;padding:48px;display:flex;flex-direction:column;gap:36px;font-family:'Open Sans',sans-serif">

  <div>
    <div style="font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#AAAABF;margin-bottom:18px">Jerarquía principal</div>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <button style="font-family:'Open Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff;background:linear-gradient(90deg,#07074E 0%,#C2410C 60%,#E87202 100%);border:none;border-radius:7px;padding:12px 26px;cursor:pointer;box-shadow:0 2px 14px rgba(194,65,12,.3)">Aplicar filtros</button>
      <button style="font-family:'Open Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#5A5A7A;background:#fff;border:1.5px solid #D4D4E8;border-radius:7px;padding:11px 26px;cursor:pointer">Restablecer</button>
      <button style="font-family:'Open Sans',sans-serif;font-size:11px;font-weight:600;color:#AAAABF;background:none;border:none;padding:12px 8px;cursor:pointer">✕ Limpiar</button>
    </div>
  </div>

  <div style="height:1px;background:#DFDFE8"></div>

  <div>
    <div style="font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#AAAABF;margin-bottom:18px">Acciones de sistema</div>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <button style="font-family:'Open Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff;background:#07074E;border:none;border-radius:7px;padding:12px 26px;cursor:pointer">Ver detalle</button>
      <button style="font-family:'Open Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff;background:linear-gradient(90deg,#07074E 0%,#C2410C 60%,#E87202 100%);border:none;border-radius:7px;padding:12px 26px;cursor:pointer;box-shadow:0 2px 14px rgba(194,65,12,.3)">Exportar CSV</button>
      <button style="font-family:'Open Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#5A5A7A;background:#fff;border:1.5px solid #D4D4E8;border-radius:7px;padding:11px 26px;cursor:pointer">Cancelar</button>
      <button style="font-family:'Open Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#CC1B00;background:transparent;border:1.5px solid rgba(204,27,0,.3);border-radius:7px;padding:11px 26px;cursor:pointer">Eliminar</button>
    </div>
  </div>

  <div style="height:1px;background:#DFDFE8"></div>

  <div>
    <div style="font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#AAAABF;margin-bottom:18px">Tamaños</div>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <button style="font-family:'Open Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;background:linear-gradient(90deg,#07074E 0%,#C2410C 60%,#E87202 100%);border:none;border-radius:7px;padding:8px 16px;cursor:pointer">Aplicar</button>
      <button style="font-family:'Open Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff;background:linear-gradient(90deg,#07074E 0%,#C2410C 60%,#E87202 100%);border:none;border-radius:7px;padding:12px 26px;cursor:pointer;box-shadow:0 2px 14px rgba(194,65,12,.3)">Aplicar filtros</button>
      <button style="font-family:'Open Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:#fff;background:linear-gradient(90deg,#07074E 0%,#C2410C 60%,#E87202 100%);border:none;border-radius:7px;padding:14px 32px;cursor:pointer;box-shadow:0 2px 14px rgba(194,65,12,.3)">Aplicar filtros</button>
    </div>
  </div>

  <div style="height:1px;background:#DFDFE8"></div>

  <div>
    <div style="font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#AAAABF;margin-bottom:18px">Sobre fondo oscuro</div>
    <div style="background:#07074E;border-radius:10px;padding:32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <button style="font-family:'Open Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff;background:linear-gradient(90deg,#07074E 0%,#C2410C 60%,#E87202 100%);border:none;border-radius:7px;padding:12px 26px;cursor:pointer;box-shadow:0 2px 14px rgba(194,65,12,.4);border:1px solid rgba(255,255,255,.15)">Aplicar filtros</button>
      <button style="font-family:'Open Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.5);background:transparent;border:1.5px solid rgba(255,255,255,.15);border-radius:7px;padding:11px 26px;cursor:pointer">Restablecer</button>
      <button style="font-family:'Open Sans',sans-serif;font-size:11px;font-weight:600;color:rgba(255,255,255,.28);background:none;border:none;padding:12px 8px;cursor:pointer">✕ Limpiar</button>
    </div>
  </div>

</div>
