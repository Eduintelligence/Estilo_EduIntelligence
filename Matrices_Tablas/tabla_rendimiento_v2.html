<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#EAEAF2;padding:32px;font-family:'Open Sans',sans-serif}
.panel{background:#fff;border-radius:10px;border:1px solid #E2E2EF;overflow:hidden}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#F4F4FA;border-bottom:1px solid #E2E2EF}
.panel-title{font-family:'Open Sans',sans-serif;font-size:9px;font-weight:700;color:#07074E;letter-spacing:.4px;text-transform:uppercase}
.btn-csv{appearance:none;font-family:'Open Sans',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;color:#07074E;background:#fff;border:1.5px solid #E2E2EF;border-radius:5px;padding:4px 10px;cursor:pointer;line-height:1}

table{width:100%;border-collapse:collapse}
thead th{
  font-family:'Open Sans',sans-serif;font-size:8px;font-weight:700;
  color:#9898B8;text-transform:uppercase;letter-spacing:.5px;
  padding:6px 12px;border-bottom:2px solid #E2E2EF;
  background:#FAFAFA;text-align:center;white-space:nowrap;
}
thead th:first-child{text-align:left}
thead th.total-col{background:#EEEEF9;color:#07074E}

tbody tr:hover td{background:#F8F8FD}
tbody td{
  padding:7px 12px;border-bottom:1px solid #F2F2F8;
  vertical-align:middle;text-align:center;
  font-family:'Open Sans',sans-serif;font-size:11px;color:#44446A;
  white-space:nowrap;
}
tbody td:first-child{text-align:left}
tbody tr:last-child td{border-bottom:none}
td.total-col{background:#FAFAFE}

.row-section td{
  background:#F4F4FA;font-family:'Open Sans',sans-serif;font-size:8px;
  font-weight:700;color:#9898B8;text-transform:uppercase;letter-spacing:.8px;
  padding:5px 12px;border-top:1px solid #E2E2EF;
}
.row-section:hover td{background:#F4F4FA}

.bar-cell{display:flex;flex-direction:column;align-items:center;gap:3px;padding:1px 0}
.bar-cell-val{font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;line-height:1}
.bar-cell-track{width:56px;height:4px;background:#EAEAF2;border-radius:2px;overflow:hidden}
.bar-cell-fill{height:100%;border-radius:2px}
</style>

<div class="panel">
  <div class="panel-hdr">
    <div class="panel-title">Tabla de Rendimiento — Indicadores Clave por Trimestre · FY 2022</div>
    <button class="btn-csv">↓ CSV</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>Indicador</th>
        <th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th>
        <th class="total-col">Total / Prom.</th>
      </tr>
    </thead>
    <tbody id="rendBody"></tbody>
  </table>
</div>

<script>
const sections = [
  {
    label:'Ingresos',
    rows:[
      { label:'Ventas Netas',        unit:'K', vals:[205,217,238,260], higher:true,  isSum:true  },
      { label:'Crecimiento YoY',     unit:'%', vals:[8.2,10.4,12.1,14.8], higher:true,  isSum:false },
      { label:'Ticket Promedio',     unit:'K', vals:[18,20,22,24],    higher:true,  isSum:false },
    ]
  },
  {
    label:'Rentabilidad',
    rows:[
      { label:'Margen Bruto',        unit:'%', vals:[36.2,37.5,38.1,39.0], higher:true, isSum:false },
      { label:'EBITDA',              unit:'K', vals:[28,32,36,41],    higher:true,  isSum:true  },
      { label:'Margen Neto',         unit:'%', vals:[9.2,11.4,13.2,14.8], higher:true, isSum:false },
    ]
  },
  {
    label:'Costos',
    rows:[
      { label:'Costo de Ventas',     unit:'%', vals:[63.8,62.5,61.9,61.0], higher:false, isSum:false },
      { label:'Gastos Operativos',   unit:'%', vals:[14.8,14.2,13.8,13.4], higher:false, isSum:false },
    ]
  },
  {
    label:'Operacional',
    rows:[
      { label:'Clientes Activos',    unit:'',  vals:[142,158,171,189], higher:true,  isSum:false },
      { label:'Satisfacción',        unit:'%', vals:[82,85,87,91],    higher:true,  isSum:false },
      { label:'Cumpl. COVENIN',      unit:'%', vals:[38,41,43,45],    higher:true,  isSum:false },
    ]
  },
];

// Para cada fila calcular el valor total/promedio
function calcTotal(row){
  if(row.isSum) return row.vals.reduce((a,b)=>a+b,0);
  return parseFloat((row.vals.reduce((a,b)=>a+b,0)/row.vals.length).toFixed(1));
}

// Para cada fila, el máximo es el mayor valor de esa fila (incluyendo total)
// Esto hace que las barras sean proporcionales entre sí dentro de la misma métrica
function makeBar(val, rowMax, higher, isTotal=false){
  const pct = rowMax > 0 ? Math.min((val/rowMax)*100, 100) : 0;

  let color;
  if(isTotal){
    color = 'linear-gradient(90deg,#07074E,#C2410C)';
  } else if(higher){
    // mayor = mejor: más largo = más verde
    color = pct >= 80 ? '#1A7F3C' : pct >= 50 ? '#B87800' : '#CC1B00';
  } else {
    // menor = mejor: más largo = más rojo
    color = pct <= 50 ? '#1A7F3C' : pct <= 75 ? '#B87800' : '#CC1B00';
  }

  const textColor = isTotal ? '#07074E' : (higher
    ? (pct>=80?'#1A7F3C':pct>=50?'#B87800':'#CC1B00')
    : (pct<=50?'#1A7F3C':pct<=75?'#B87800':'#CC1B00'));

  return `<div class="bar-cell">
    <span class="bar-cell-val" style="color:${textColor}">${val}</span>
    <div class="bar-cell-track">
      <div class="bar-cell-fill" style="width:${pct}%;background:${color}"></div>
    </div>
  </div>`;
}

let html = '';
sections.forEach(sec => {
  html += `<tr class="row-section"><td colspan="6">${sec.label}</td></tr>`;
  sec.rows.forEach(row => {
    const total = calcTotal(row);
    // Máximo de la fila = max entre todos los valores + total
    const allVals = [...row.vals, total];
    const rowMax  = Math.max(...allVals);

    html += `<tr>
      <td style="font-family:'Open Sans',sans-serif;font-size:11px;color:#44446A">
        ${row.label}
        <span style="font-size:8px;color:#AAAABF;margin-left:3px">${row.unit}</span>
      </td>
      ${row.vals.map(v => `<td>${makeBar(v, rowMax, row.higher)}</td>`).join('')}
      <td class="total-col">${makeBar(total, rowMax, row.higher, true)}</td>
    </tr>`;
  });
});

document.getElementById('rendBody').innerHTML = html;
</script>
