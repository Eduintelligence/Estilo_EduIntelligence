<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<div style="background:#EAEAF2;padding:32px;font-family:'Open Sans',sans-serif;display:flex;flex-direction:column;gap:24px">

  <!-- VERTICAL — color único -->
  <div style="background:#fff;border-radius:10px;border:1px solid #E2E2EF;overflow:hidden">
    <div style="padding:8px 14px;display:flex;align-items:center;justify-content:space-between;background:#F4F4FA;border-bottom:1px solid #E2E2EF">
      <div style="font-family:'Open Sans',sans-serif;font-size:9px;font-weight:700;color:#07074E;letter-spacing:.4px;text-transform:uppercase">Ventas Netas por Mes — FY 2022</div>
      <button style="appearance:none;font-family:'Open Sans',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;color:#07074E;background:#fff;border:1.5px solid #E2E2EF;border-radius:5px;padding:4px 10px;cursor:pointer;line-height:1">↓ CSV</button>
    </div>
    <div style="padding:16px 16px 8px;position:relative;height:260px">
      <canvas id="lol1" role="img" aria-label="Lollipop ventas netas por mes FY 2022"></canvas>
    </div>
    <div style="margin:0 14px 12px;border-radius:6px;background:#EEF7F1;border-left:3px solid #1A7F3C;padding:8px 12px">
      <div style="font-family:'Open Sans',sans-serif;font-size:9px;color:#44446A;line-height:1.55">
        Crecimiento sostenido durante el año · <span style="font-family:'Poppins',sans-serif;font-weight:700;color:#C96A00">Dic</span> cierra con el máximo de <span style="font-family:'Poppins',sans-serif;font-weight:700;color:#C96A00">96K</span> — un <span style="font-family:'Poppins',sans-serif;font-weight:700;color:#C96A00">+44%</span> respecto a Ene.
      </div>
    </div>
  </div>

  <!-- HORIZONTAL — color semántico -->
  <div style="background:#fff;border-radius:10px;border:1px solid #E2E2EF;overflow:hidden">
    <div style="padding:8px 14px;display:flex;align-items:center;justify-content:space-between;background:#F4F4FA;border-bottom:1px solid #E2E2EF">
      <div style="font-family:'Open Sans',sans-serif;font-size:9px;font-weight:700;color:#07074E;letter-spacing:.4px;text-transform:uppercase">Cumplimiento por Área — Ranking · SEM 4</div>
      <button style="appearance:none;font-family:'Open Sans',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;color:#07074E;background:#fff;border:1.5px solid #E2E2EF;border-radius:5px;padding:4px 10px;cursor:pointer;line-height:1">↓ CSV</button>
    </div>
    <div style="padding:16px 16px 8px;position:relative;height:360px">
      <canvas id="lol2" role="img" aria-label="Lollipop cumplimiento por área SEM 4"></canvas>
    </div>
    <div style="margin:0 14px 12px;border-radius:6px;background:#FFF0EE;border-left:3px solid #CC1B00;padding:8px 12px">
      <div style="font-family:'Open Sans',sans-serif;font-size:9px;color:#44446A;line-height:1.55">
        <span style="font-family:'Poppins',sans-serif;font-weight:700;color:#CC1B00">5 áreas</span> están en condición Grave por debajo del 40% · Solo <span style="font-family:'Poppins',sans-serif;font-weight:700;color:#C96A00">I Org. Empresa</span> supera el 60% de cumplimiento.
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const gridH  = { color:'#F0F0F8', drawBorder:false };
const noGrid = { display:false };

// ── LOLLIPOP VERTICAL ──────────────────────────────────
const ventasData = [66,70,74,76,78,82,84,86,88,90,93,96];
const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

new Chart(document.getElementById('lol1'), {
  type:'bar',
  data:{
    labels: meses,
    datasets:[
      // Línea (tallo) — barra muy delgada
      {
        type:'bar',
        data: ventasData,
        backgroundColor: 'rgba(7,7,78,.15)',
        borderColor: 'rgba(7,7,78,.15)',
        borderWidth: 0,
        barPercentage: 0.06,
        categoryPercentage: 1,
        borderRadius: 0,
        order: 2
      },
      // Punto (cabeza)
      {
        type:'scatter',
        data: meses.map((m,i) => ({ x:m, y:ventasData[i] })),
        backgroundColor: '#07074E',
        borderColor: '#fff',
        borderWidth: 2,
        pointRadius: 7,
        pointHoverRadius: 9,
        order: 1
      }
    ]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{
      legend:{ display:false },
      tooltip:{
        titleFont:{ family:"'Poppins',sans-serif", size:11, weight:'700' },
        bodyFont:{ family:"'Open Sans',sans-serif", size:10 },
        filter: item => item.datasetIndex === 1,
        callbacks:{ label: ctx => '  Ventas: '+ctx.raw.y+'K' }
      }
    },
    scales:{
      x:{ grid:noGrid, border:{display:false}, ticks:{ color:'#6B6B8A', font:{ family:"'Open Sans',sans-serif", size:9 } } },
      y:{ grid:gridH,  border:{display:false}, ticks:{ color:'#AAAABF', font:{ family:"'Open Sans',sans-serif", size:9 }, callback:v=>v+'K' }, min:55, max:105 }
    }
  }
});

// ── LOLLIPOP HORIZONTAL ────────────────────────────────
const areas  = ['I Org. Empresa','II Org. Mtto.','III Planificación','V Mtto. Programado','IV Mtto. Rutinario','X Personal Mtto.','XI Apoyo Log.','VI Mtto. Circunstancial','XII Recursos Mtto.','VII Mtto. Correctivo','IX Mtto. Avería','VIII Mtto. Preventivo'];
const valores = [66.7,58.0,55.0,50.0,46.4,46.0,43.0,39.2,40.7,37.2,35.6,32.0];

function getColor(v){
  if(v>=60) return '#1A7F3C';
  if(v>=45) return '#B87800';
  return '#CC1B00';
}

new Chart(document.getElementById('lol2'), {
  type:'bar',
  data:{
    labels: areas,
    datasets:[
      {
        type:'bar',
        data: valores,
        backgroundColor: valores.map(v => getColor(v).replace(')',', 0.15)').replace('rgb','rgba')),
        barPercentage: 0.06,
        categoryPercentage: 1,
        borderRadius: 0,
        indexAxis:'y',
        order:2
      },
      {
        type:'scatter',
        data: areas.map((a,i) => ({ y:a, x:valores[i] })),
        backgroundColor: valores.map(getColor),
        borderColor: '#fff',
        borderWidth: 2,
        pointRadius: 7,
        pointHoverRadius: 9,
        indexAxis:'y',
        order:1
      }
    ]
  },
  options:{
    indexAxis:'y',
    responsive:true,
    maintainAspectRatio:false,
    plugins:{
      legend:{ display:false },
      tooltip:{
        titleFont:{ family:"'Poppins',sans-serif", size:11, weight:'700' },
        bodyFont:{ family:"'Open Sans',sans-serif", size:10 },
        filter: item => item.datasetIndex === 1,
        callbacks:{ label: ctx => '  Cumplimiento: '+ctx.raw.x+'%' }
      }
    },
    scales:{
      x:{
        grid:gridH,
        border:{display:false},
        ticks:{ color:'#AAAABF', font:{ family:"'Open Sans',sans-serif", size:9 }, callback:v=>v+'%' },
        min:0, max:80
      },
      y:{
        grid:noGrid,
        border:{display:false},
        ticks:{ color:'#44446A', font:{ family:"'Open Sans',sans-serif", size:10 }, crossAlign:'far' }
      }
    }
  },
  plugins:[{
    id:'valueLabels',
    afterDatasetsDraw(chart){
      if(chart.config.options.indexAxis !== 'y') return;
      const { ctx } = chart;
      const meta = chart.getDatasetMeta(1);
      ctx.save();
      meta.data.forEach((pt, i) => {
        const v = valores[i];
        ctx.fillStyle = getColor(v);
        ctx.font = `700 9px 'Open Sans',sans-serif`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(v+'%', pt.x + 10, pt.y);
      });
      ctx.restore();
    }
  }]
});
</script>
